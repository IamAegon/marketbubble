<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-labelledby="ansem-title ansem-desc">
  <title id="ansem-title">Ansem market oracle avatar</title>
  <desc id="ansem-desc">Original masked market oracle mascot with bull horns, a black hood, and neon trading signals.</desc>
  <defs>
    <clipPath id="clip">
      <circle cx="128" cy="128" r="120"/>
    </clipPath>

    <linearGradient id="ring" x1="29" y1="25" x2="224" y2="226" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8b5cff"/>
      <stop offset=".34" stop-color="#35f7d2"/>
      <stop offset=".7" stop-color="#e8ff9c"/>
      <stop offset="1" stop-color="#8b5cff"/>
    </linearGradient>

    <radialGradient id="bg" cx="0" cy="0" r="1" gradientTransform="matrix(112 106 -106 112 129 89)" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#263f38"/>
      <stop offset=".45" stop-color="#101116"/>
      <stop offset="1" stop-color="#030405"/>
    </radialGradient>

    <radialGradient id="halo" cx="0" cy="0" r="1" gradientTransform="matrix(104 0 0 96 128 94)" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e8ff9c" stop-opacity=".54"/>
      <stop offset=".35" stop-color="#35f7d2" stop-opacity=".2"/>
      <stop offset=".72" stop-color="#8b5cff" stop-opacity=".08"/>
      <stop offset="1" stop-color="#8b5cff" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="hood" x1="70" y1="54" x2="185" y2="239" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2b2f3a"/>
      <stop offset=".5" stop-color="#11131a"/>
      <stop offset="1" stop-color="#030405"/>
    </linearGradient>

    <linearGradient id="mask" x1="90" y1="84" x2="166" y2="177" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#161b22"/>
      <stop offset=".55" stop-color="#080a0d"/>
      <stop offset="1" stop-color="#020303"/>
    </linearGradient>

    <linearGradient id="visor" x1="78" y1="116" x2="176" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e8ff9c"/>
      <stop offset=".34" stop-color="#35f7d2"/>
      <stop offset=".7" stop-color="#8b5cff"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>

    <linearGradient id="horn" x1="24" y1="61" x2="232" y2="105" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e8ff9c"/>
      <stop offset=".48" stop-color="#35f7d2"/>
      <stop offset="1" stop-color="#8b5cff"/>
    </linearGradient>

    <filter id="shadow" x="-30%" y="-25%" width="160%" height="165%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="13" stdDeviation="10" flood-color="#000000" flood-opacity=".7"/>
    </filter>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="2.1" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 .45 0 0 0 0 1 0 0 0 0 .84 0 0 0 .95 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <circle cx="128" cy="128" r="126" fill="#030405"/>
  <circle cx="128" cy="128" r="121" fill="url(#ring)"/>
  <circle cx="128" cy="128" r="116" fill="url(#bg)"/>

  <g clip-path="url(#clip)">
    <rect width="256" height="256" fill="url(#halo)"/>

    <g opacity=".16" stroke="#f6fff4" stroke-width="1">
      <path d="M15 68h226M10 112h236M18 156h220M38 200h180"/>
      <path d="M52 21v220M92 15v234M132 10v240M172 16v233M212 29v211"/>
    </g>

    <g fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M24 186c29-39 57-22 88-48 31-26 62-33 112-15" stroke="#8b5cff" stroke-width="4" opacity=".54"/>
      <path d="M41 205c31-14 61 5 92-10 30-14 50-31 88-19" stroke="#35f7d2" stroke-width="3" opacity=".78"/>
      <path d="M62 217c36-6 58 8 90 0 24-6 39-20 58-15" stroke="#e8ff9c" stroke-width="2.5" opacity=".75"/>
    </g>

    <g opacity=".8">
      <rect x="44" y="106" width="9" height="32" rx="4.5" fill="#35f7d2"/>
      <path d="M48.5 96v51" stroke="#35f7d2" stroke-width="2" stroke-linecap="round"/>
      <rect x="67" y="80" width="9" height="39" rx="4.5" fill="#e8ff9c"/>
      <path d="M71.5 70v56" stroke="#e8ff9c" stroke-width="2" stroke-linecap="round"/>
      <rect x="204" y="74" width="9" height="42" rx="4.5" fill="#8b5cff"/>
      <path d="M208.5 64v56" stroke="#8b5cff" stroke-width="2" stroke-linecap="round"/>
    </g>

    <g filter="url(#shadow)">
      <path d="M18 101c28-42 72-52 112-23" fill="none" stroke="url(#horn)" stroke-width="8" stroke-linecap="round"/>
      <path d="M238 101c-28-42-72-52-112-23" fill="none" stroke="url(#horn)" stroke-width="8" stroke-linecap="round"/>
      <path d="M68 111C51 97 33 95 18 101c19-31 55-49 95-30-13 8-25 20-45 40Z" fill="#10131a"/>
      <path d="M188 111c17-14 35-16 50-10-19-31-55-49-95-30 13 8 25 20 45 40Z" fill="#10131a"/>

      <path d="M41 239c9-52 38-91 79-104h56c41 13 70 52 79 104H41Z" fill="#030405"/>
      <path d="M61 239c9-57 37-103 67-103s58 46 67 103H61Z" fill="url(#hood)"/>
      <path d="M75 168c1-62 31-111 53-111s52 49 53 111c-15-18-35-27-53-27s-38 9-53 27Z" fill="#232733"/>
      <path d="M86 157c5-46 26-82 42-82s37 36 42 82c-16-13-31-18-42-18s-26 5-42 18Z" fill="#05070a"/>

      <path d="M87 112c0-25 17-43 41-43s41 18 41 43v41c0 25-17 44-41 44s-41-19-41-44v-41Z" fill="url(#mask)"/>
      <path d="M94 101c8-29 27-47 51-42 16 4 27 19 32 43-29-12-54-14-83-1Z" fill="#171b25"/>
      <path d="M97 91c18-17 38-19 59-6-20-3-39-1-59 6Z" fill="#394052" opacity=".7"/>

      <path d="M78 119c21-12 43-11 61-2 16-8 35-7 54 2" fill="none" stroke="#010203" stroke-width="9" stroke-linecap="round"/>
      <path d="M86 115c13-5 31-3 46 3 4 2 5 5 3 10l-6 20c-2 6-6 9-12 9H99c-7 0-11-3-13-9l-6-20c-2-5 0-9 6-13Z" fill="#020304" stroke="#171b24" stroke-width="3"/>
      <path d="M143 118c15-6 33-8 46-3 6 4 8 8 6 13l-6 20c-2 6-6 9-13 9h-18c-6 0-10-3-12-9l-6-20c-2-5-1-8 3-10Z" fill="#020304" stroke="#171b24" stroke-width="3"/>
      <path d="M93 121c11-4 23-3 34 1M150 122c11-4 23-5 35-1" stroke="url(#visor)" stroke-width="5.5" stroke-linecap="round" filter="url(#glow)"/>
      <path d="M136 125h8" stroke="#12151b" stroke-width="5" stroke-linecap="round"/>

      <path d="M109 173c9 5 28 5 37 0" stroke="#303640" stroke-width="4" stroke-linecap="round"/>
      <path d="M96 190c14 20 40 30 68 20" fill="none" stroke="url(#ring)" stroke-width="6" stroke-linecap="round" filter="url(#glow)"/>
      <path d="M105 214h60" stroke="#e8ff9c" stroke-width="3" stroke-linecap="round" opacity=".82"/>

      <g transform="translate(169 178)">
        <circle cx="28" cy="28" r="22" fill="#050608" stroke="#e8ff9c" stroke-width="3"/>
        <path d="M13 29c8-14 23-14 31 0M20 37c6 7 15 7 22 0" fill="none" stroke="#35f7d2" stroke-width="4" stroke-linecap="round"/>
      </g>
    </g>
  </g>

  <circle cx="128" cy="128" r="121" fill="none" stroke="#030405" stroke-width="4"/>
  <circle cx="128" cy="128" r="118" fill="none" stroke="url(#ring)" stroke-width="4"/>
  <circle cx="128" cy="128" r="108" fill="none" stroke="#ffffff" stroke-opacity=".07" stroke-width="1"/>
</svg>
