<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-labelledby="fazbank-title fazbank-desc">
  <title id="fazbank-title">Fazbank vault runner avatar</title>
  <desc id="fazbank-desc">Original masked gaming finance mascot with a red cap, gold visor, headset, chain, and vault motif.</desc>
  <defs>
    <clipPath id="clip">
      <circle cx="128" cy="128" r="120"/>
    </clipPath>

    <linearGradient id="ring" x1="29" y1="24" x2="224" y2="227" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff2d55"/>
      <stop offset=".44" stop-color="#ff8a3d"/>
      <stop offset=".76" stop-color="#f6d56f"/>
      <stop offset="1" stop-color="#ff2d55"/>
    </linearGradient>

    <radialGradient id="bg" cx="0" cy="0" r="1" gradientTransform="matrix(111 104 -106 114 130 91)" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#47251b"/>
      <stop offset=".45" stop-color="#101114"/>
      <stop offset="1" stop-color="#030304"/>
    </radialGradient>

    <radialGradient id="halo" cx="0" cy="0" r="1" gradientTransform="matrix(105 0 0 98 139 91)" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff2d55" stop-opacity=".5"/>
      <stop offset=".37" stop-color="#ff8a3d" stop-opacity=".2"/>
      <stop offset=".74" stop-color="#f6d56f" stop-opacity=".08"/>
      <stop offset="1" stop-color="#f6d56f" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="cap" x1="74" y1="60" x2="187" y2="113" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#20242d"/>
      <stop offset=".42" stop-color="#ff2d55"/>
      <stop offset="1" stop-color="#ff8a3d"/>
    </linearGradient>

    <linearGradient id="hood" x1="67" y1="122" x2="191" y2="239" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#282b35"/>
      <stop offset=".52" stop-color="#101116"/>
      <stop offset="1" stop-color="#030304"/>
    </linearGradient>

    <linearGradient id="mask" x1="90" y1="90" x2="165" y2="186" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1a1d25"/>
      <stop offset=".54" stop-color="#08090c"/>
      <stop offset="1" stop-color="#020203"/>
    </linearGradient>

    <linearGradient id="visor" x1="84" y1="119" x2="180" y2="130" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff2d55"/>
      <stop offset=".45" stop-color="#ff8a3d"/>
      <stop offset="1" stop-color="#f6d56f"/>
    </linearGradient>

    <linearGradient id="metal" x1="69" y1="82" x2="190" y2="158" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset=".4" stop-color="#bfc6d3"/>
      <stop offset="1" stop-color="#515867"/>
    </linearGradient>

    <filter id="shadow" x="-30%" y="-25%" width="160%" height="165%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="13" stdDeviation="10" flood-color="#000000" flood-opacity=".7"/>
    </filter>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="2.1" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 .96 0 0 0 0 .35 0 0 0 0 .18 0 0 0 .95 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <circle cx="128" cy="128" r="126" fill="#030304"/>
  <circle cx="128" cy="128" r="121" fill="url(#ring)"/>
  <circle cx="128" cy="128" r="116" fill="url(#bg)"/>

  <g clip-path="url(#clip)">
    <rect width="256" height="256" fill="url(#halo)"/>

    <g opacity=".16" stroke="#fff4d7" stroke-width="1">
      <path d="M15 68h226M10 112h236M18 156h220M38 200h180"/>
      <path d="M52 21v220M92 15v234M132 10v240M172 16v233M212 29v211"/>
    </g>

    <g fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M25 184c28-26 51-13 77-34 35-28 70-34 124-13" stroke="#ff2d55" stroke-width="4" opacity=".6"/>
      <path d="M43 205c31-11 59 4 91-8 31-12 51-30 86-17" stroke="#f6d56f" stroke-width="3" opacity=".76"/>
      <path d="M40 151c16 0 16-17 32-17s16 17 32 17 16-17 32-17" stroke="#38bdf8" stroke-width="2.5" opacity=".44"/>
    </g>

    <g transform="translate(166 39)" opacity=".96">
      <circle cx="39" cy="39" r="34" fill="#090a0d" stroke="#ff2d55" stroke-width="4"/>
      <circle cx="39" cy="39" r="21" fill="none" stroke="#f6d56f" stroke-width="4" stroke-opacity=".62"/>
      <path d="M39 17v14M39 49v14M17 39h14M49 39h14" stroke="#ff8a3d" stroke-width="5" stroke-linecap="round"/>
      <circle cx="39" cy="39" r="7" fill="#f6d56f"/>
    </g>

    <g filter="url(#shadow)">
      <path d="M43 239c9-51 38-88 78-101h55c40 13 69 50 78 101H43Z" fill="#030304"/>
      <path d="M61 239c10-50 39-88 67-88s57 38 67 88H61Z" fill="url(#hood)"/>
      <path d="M78 232c7-31 23-53 50-53s43 22 50 53H78Z" fill="#06070a"/>

      <path d="M82 112c0-31 19-52 46-52s46 21 46 52" fill="none" stroke="url(#metal)" stroke-width="10" stroke-linecap="round"/>
      <rect x="68" y="104" width="22" height="53" rx="11" fill="#0b0c10" stroke="#d8dee9" stroke-width="4"/>
      <rect x="166" y="104" width="22" height="53" rx="11" fill="#0b0c10" stroke="#d8dee9" stroke-width="4"/>
      <path d="M184 151c15 3 23 11 23 25" fill="none" stroke="#d8dee9" stroke-width="4" stroke-linecap="round"/>
      <circle cx="207" cy="176" r="6" fill="#ff2d55" stroke="#f6d56f" stroke-width="2"/>

      <path d="M86 111c0-28 17-48 42-48s42 20 42 48v43c0 26-17 46-42 46s-42-20-42-46v-43Z" fill="url(#mask)"/>
      <path d="M76 96c10-30 31-48 61-46 25 2 43 17 52 43-36-6-70-4-113 3Z" fill="#090a0d"/>
      <path d="M79 95c25-18 66-25 113-3 7 3 8 11 2 16-42-10-86-9-125 3l3-7c2-4 4-6 7-9Z" fill="url(#cap)"/>
      <path d="M99 78c30-13 56-11 79 3-33-5-59-3-79 3Z" fill="#343844" opacity=".56"/>
      <path d="M108 83l15 14 32-22-13 20 25-4" fill="none" stroke="#f6d56f" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

      <path d="M81 120c21-12 44-11 62-2 16-8 36-7 55 2" fill="none" stroke="#010203" stroke-width="9" stroke-linecap="round"/>
      <path d="M89 116c14-5 32-3 47 3 4 2 5 5 3 10l-6 19c-2 6-6 9-12 9h-19c-7 0-11-3-13-9l-6-19c-2-5 0-9 6-13Z" fill="#020304" stroke="#171b24" stroke-width="3"/>
      <path d="M146 119c15-6 33-8 47-3 6 4 8 8 6 13l-6 19c-2 6-6 9-13 9h-19c-6 0-10-3-12-9l-6-19c-2-5-1-8 3-10Z" fill="#020304" stroke="#171b24" stroke-width="3"/>
      <path d="M96 122c11-4 24-3 35 1M153 123c11-4 24-5 36-1" stroke="url(#visor)" stroke-width="5.5" stroke-linecap="round" filter="url(#glow)"/>
      <path d="M139 126h8" stroke="#12151b" stroke-width="5" stroke-linecap="round"/>

      <path d="M105 169c11 7 35 7 47 0" stroke="#2f343d" stroke-width="4" stroke-linecap="round"/>
      <path d="M96 188c15 20 43 29 70 17" fill="none" stroke="url(#ring)" stroke-width="6" stroke-linecap="round" filter="url(#glow)"/>
      <g transform="translate(91 197)" fill="#07080a" stroke="#f6d56f" stroke-width="3">
        <circle cx="11" cy="8" r="8"/>
        <circle cx="32" cy="12" r="8"/>
        <circle cx="53" cy="12" r="8"/>
        <circle cx="74" cy="8" r="8"/>
      </g>
      <path d="M98 205h72" stroke="#ff2d55" stroke-width="3" stroke-linecap="round"/>
    </g>
  </g>

  <circle cx="128" cy="128" r="121" fill="none" stroke="#030304" stroke-width="4"/>
  <circle cx="128" cy="128" r="118" fill="none" stroke="url(#ring)" stroke-width="4"/>
  <circle cx="128" cy="128" r="108" fill="none" stroke="#ffffff" stroke-opacity=".07" stroke-width="1"/>
</svg>
